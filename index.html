<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LENS — Gallery App</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   ROOT & RESET
═══════════════════════════════════════════ */
:root {
  --bg:       #060610;
  --surface:  #0d0d20;
  --card:     #12122a;
  --nav-bg:   #09091a;
  --a1:       #ff6b35;
  --a2:       #f7c59f;
  --a3:       #00d4ff;
  --a4:       #7b2fff;
  --gold:     #ffc947;
  --white:    #f4f4ff;
  --muted:    #6a6a9a;
  --g1: linear-gradient(135deg,#ff6b35,#f7c59f);
  --g2: linear-gradient(135deg,#00d4ff,#7b2fff);
  --g3: linear-gradient(135deg,#ff6b35,#7b2fff);
  --shadow: 0 8px 40px rgba(0,0,0,0.7);
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--white);
  font-family: 'Exo 2', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}
img { display:block; }
button { cursor:pointer; border:none; background:none; }

/* ═══════════════════════════════════════════
   SPLASH / APP LOADING SCREEN
═══════════════════════════════════════════ */
#splash {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 32px;
  transition: opacity 0.7s ease, visibility 0.7s ease;
}
#splash.hide { opacity:0; visibility:hidden; pointer-events:none; }

.splash-logo {
  font-family: 'Orbitron', monospace;
  font-weight: 900;
  font-size: clamp(3.5rem, 12vw, 8rem);
  letter-spacing: 0.12em;
  position: relative;
  line-height: 1;
}
/* 3D LAYERED TEXT EFFECT */
.splash-logo .txt {
  background: var(--g1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  position: relative;
  z-index: 3;
  filter: drop-shadow(0 0 30px rgba(255,107,53,0.6));
  animation: logoGlow 2s ease-in-out infinite alternate;
}
.splash-logo::before {
  content: 'LENS';
  position: absolute; inset: 0;
  font-family: 'Orbitron', monospace;
  font-weight: 900;
  font-size: 1em;
  letter-spacing: 0.12em;
  background: var(--g2);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  transform: translate(4px, 4px);
  z-index: 2;
}
.splash-logo::after {
  content: 'LENS';
  position: absolute; inset: 0;
  font-family: 'Orbitron', monospace;
  font-weight: 900;
  font-size: 1em;
  letter-spacing: 0.12em;
  color: rgba(0,0,0,0.5);
  transform: translate(8px, 8px);
  z-index: 1;
  filter: blur(2px);
}
@keyframes logoGlow {
  from { filter: drop-shadow(0 0 20px rgba(255,107,53,0.5)); }
  to   { filter: drop-shadow(0 0 50px rgba(255,107,53,0.9)) drop-shadow(0 0 80px rgba(0,212,255,0.4)); }
}

.splash-sub {
  font-family: 'Orbitron', monospace;
  font-size: clamp(0.55rem, 2vw, 0.85rem);
  letter-spacing: 0.55em;
  color: var(--muted);
  text-transform: uppercase;
}

/* SPLASH — IMAGE GALLERY NAME */
.splash-gallery-name {
  text-align: center;
  line-height: 1;
  animation: splashNameIn 0.9s cubic-bezier(0.23,1,0.32,1) 0.3s both;
}
@keyframes splashNameIn {
  from { opacity:0; transform: translateY(30px) scale(0.92); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}
.sgn-word1 {
  display: block;
  font-family: 'Black Han Sans', sans-serif;
  font-size: clamp(2.8rem, 10vw, 7.5rem);
  letter-spacing: 0.18em;
  /* 3D layered effect */
  color: var(--white);
  text-shadow:
    2px 2px 0 rgba(255,107,53,0.7),
    4px 4px 0 rgba(255,107,53,0.5),
    6px 6px 0 rgba(255,107,53,0.3),
    8px 8px 0 rgba(255,107,53,0.15),
    0 0 60px rgba(255,107,53,0.3);
  animation: nameFloat 3s ease-in-out infinite alternate;
}
.sgn-word2 {
  display: block;
  font-family: 'Black Han Sans', sans-serif;
  font-size: clamp(2.8rem, 10vw, 7.5rem);
  letter-spacing: 0.18em;
  background: var(--g1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(3px 3px 0 rgba(255,107,53,0.5)) drop-shadow(6px 6px 0 rgba(255,107,53,0.25));
  animation: nameFloat 3s ease-in-out 0.3s infinite alternate;
}
@keyframes nameFloat {
  from { transform: translateY(0); }
  to   { transform: translateY(-6px); }
}

/* SPLASH DIVIDER */
.splash-divider {
  display: flex;
  align-items: center;
  gap: 14px;
  width: min(340px, 80vw);
  animation: splashNameIn 0.9s cubic-bezier(0.23,1,0.32,1) 0.5s both;
}
.splash-divider::before,
.splash-divider::after {
  content: '';
  flex: 1; height: 1px;
  background: linear-gradient(to right, transparent, rgba(255,107,53,0.5), transparent);
}
.splash-diamond {
  width: 8px; height: 8px;
  background: var(--a1);
  transform: rotate(45deg);
  box-shadow: 0 0 10px rgba(255,107,53,0.8);
  animation: diamondPulse 1.5s ease-in-out infinite alternate;
}
@keyframes diamondPulse {
  from { box-shadow: 0 0 8px rgba(255,107,53,0.6); }
  to   { box-shadow: 0 0 20px rgba(255,107,53,1), 0 0 40px rgba(255,107,53,0.4); }
}

/* PROGRESS BAR */
.splash-progress-wrap {
  width: min(300px, 78vw); height: 3px;
  background: rgba(255,255,255,0.07);
  border-radius: 2px;
  overflow: hidden;
  animation: splashNameIn 0.9s cubic-bezier(0.23,1,0.32,1) 0.6s both;
}
.splash-progress-bar {
  height: 100%;
  width: 0%;
  background: var(--g1);
  border-radius: 2px;
  transition: width 0.15s ease;
  box-shadow: 0 0 10px rgba(255,107,53,0.7);
}
.splash-pct {
  font-family: 'Orbitron', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  color: var(--muted);
  animation: splashNameIn 0.9s 0.65s both;
}

#splashLoadingArea {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

/* OPEN GALLERY BUTTON */
.splash-open-btn {
  display: none; /* shown when loading reaches 100% */
  position: relative;
  font-family: 'Orbitron', monospace;
  font-weight: 700;
  font-size: clamp(0.75rem, 2.5vw, 1rem);
  letter-spacing: 0.35em;
  padding: 18px 56px;
  border-radius: 4px;
  color: var(--white);
  overflow: hidden;
  border: none;
  cursor: pointer;
  animation: btnAppear 0.6s cubic-bezier(0.23,1,0.32,1) both;
}
@keyframes btnAppear {
  from { opacity:0; transform:scale(0.85) translateY(20px); }
  to   { opacity:1; transform:scale(1) translateY(0); }
}
.sob-bg {
  position:absolute; inset:0;
  background: var(--g3);
  background-size:200% 200%;
  animation:sobGrad 2.5s ease infinite;
  z-index:0;
}
@keyframes sobGrad {
  0%,100%{background-position:0% 50%}
  50%{background-position:100% 50%}
}
.sob-shine {
  position:absolute; top:0; left:-160%;
  width:60%; height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.22),transparent);
  animation:sobShine 2s ease-in-out infinite;
  z-index:1;
}
@keyframes sobShine { to{left:200%;} }
.sob-glow {
  position:absolute; inset:-2px;
  background: var(--g3);
  border-radius:5px;
  z-index:-1;
  filter:blur(10px);
  opacity:0.5;
  animation:sobGrad 2.5s ease infinite;
}
.sob-txt {
  position:relative; z-index:2;
  display:flex; align-items:center; gap:10px;
}
.sob-arrow {
  display:inline-block;
  animation:arrowBounce 1s ease-in-out infinite alternate;
}
@keyframes arrowBounce {
  from{transform:translateX(0);}
  to{transform:translateX(5px);}
}
.splash-open-btn:hover { box-shadow:0 0 50px rgba(255,107,53,0.7), 0 0 100px rgba(123,47,255,0.3); transform:translateY(-3px); transition:box-shadow 0.3s, transform 0.3s; }
.splash-open-btn:active { transform:translateY(-1px); }

/* ═══════════════════════════════════════════
   TOP NAV BAR
═══════════════════════════════════════════ */
#appNav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 800;
  height: 62px;
  background: rgba(6,6,16,0.88);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(255,107,53,0.15);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  transform: translateY(-100%);
  transition: transform 0.6s cubic-bezier(0.23,1,0.32,1);
}
#appNav.show { transform: translateY(0); }

.nav-brand {
  font-family: 'Orbitron', monospace;
  font-weight: 900;
  font-size: 1.6rem;
  letter-spacing: 0.15em;
  background: var(--g1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  position: relative;
  text-shadow: none;
  filter: drop-shadow(0 0 8px rgba(255,107,53,0.5));
}
.nav-brand::before {
  content: 'LENS';
  position: absolute; top: 2px; left: 2px;
  font-family: 'Orbitron', monospace;
  font-weight: 900;
  font-size: 1em;
  letter-spacing: 0.15em;
  background: var(--g2);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  z-index: -1;
}

.nav-right { display:flex; align-items:center; gap:14px; }

/* HAMBURGER */
.hamburger {
  width: 42px; height: 42px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  border-radius: 4px;
  border: 1px solid rgba(255,107,53,0.3);
  transition: border-color 0.3s, box-shadow 0.3s;
  position: relative;
  overflow: hidden;
}
.hamburger::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg,rgba(255,107,53,0.12),rgba(0,212,255,0.12));
  opacity: 0;
  transition: opacity 0.3s;
}
.hamburger:hover::before, .hamburger.open::before { opacity: 1; }
.hamburger:hover, .hamburger.open { border-color: var(--a1); box-shadow: 0 0 16px rgba(255,107,53,0.4); }

.ham-line {
  width: 22px; height: 2px;
  background: var(--a1);
  border-radius: 2px;
  transition: transform 0.35s cubic-bezier(0.23,1,0.32,1), opacity 0.3s, width 0.3s;
}
.hamburger.open .ham-line:nth-child(1) { transform: translateY(8px) rotate(45deg); }
.hamburger.open .ham-line:nth-child(2) { opacity: 0; width: 0; }
.hamburger.open .ham-line:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

/* ═══════════════════════════════════════════
   SIDE PANEL (Hamburger Menu with Slides)
═══════════════════════════════════════════ */
#sidePanel {
  position: fixed;
  top: 0; right: 0;
  width: min(360px, 88vw);
  height: 100vh;
  background: var(--nav-bg);
  border-left: 1px solid rgba(255,107,53,0.2);
  z-index: 900;
  transform: translateX(100%);
  transition: transform 0.45s cubic-bezier(0.23,1,0.32,1);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#sidePanel.open { transform: translateX(0); }

.panel-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  z-index: 890;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s;
}
.panel-backdrop.show { opacity:1; pointer-events:all; }

.panel-header {
  padding: 20px 20px 16px;
  border-bottom: 1px solid rgba(255,107,53,0.15);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.panel-title {
  font-family: 'Orbitron', monospace;
  font-weight: 700;
  font-size: 1rem;
  letter-spacing: 0.25em;
  background: var(--g1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.panel-close {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 1px solid rgba(255,107,53,0.4);
  color: var(--a1);
  font-size: 1.1rem;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.3s, box-shadow 0.3s;
}
.panel-close:hover { background: rgba(255,107,53,0.15); box-shadow: 0 0 12px rgba(255,107,53,0.4); }

/* SLIDES inside panel */
.panel-slides {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,107,53,0.3) transparent;
}

.slide-card {
  position: relative;
  border-radius: 8px;
  overflow: hidden;
  cursor: pointer;
  flex-shrink: 0;
  height: 130px;
  transition: transform 0.3s ease, box-shadow 0.3s;
  border: 1px solid rgba(255,255,255,0.06);
}
.slide-card:hover { transform: translateX(-4px) scale(1.01); box-shadow: 0 10px 30px rgba(0,0,0,0.5), 4px 0 0 var(--a1) inset; }
.slide-card img {
  width:100%; height:100%;
  object-fit: cover;
  transition: transform 0.5s ease, filter 0.4s;
  filter: brightness(0.75) saturate(1.2);
}
.slide-card:hover img { transform:scale(1.07); filter:brightness(0.9) saturate(1.4); }
.slide-info {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(6,6,16,0.92));
  padding: 20px 12px 10px;
}
.slide-cat {
  font-family: 'Orbitron', monospace;
  font-size: 0.55rem;
  letter-spacing: 0.35em;
  color: var(--a1);
  text-transform: uppercase;
}
.slide-name {
  font-family: 'Exo 2', sans-serif;
  font-weight: 700;
  font-size: 0.9rem;
  color: var(--white);
  margin-top: 2px;
}
.slide-badge {
  position: absolute;
  top: 10px; right: 10px;
  font-family: 'Orbitron', monospace;
  font-size: 0.5rem;
  letter-spacing: 0.2em;
  padding: 3px 8px;
  background: rgba(6,6,16,0.7);
  border: 1px solid rgba(0,212,255,0.5);
  color: var(--a3);
  border-radius: 2px;
  backdrop-filter: blur(4px);
}

/* Panel Nav Links */
.panel-nav {
  padding: 12px 16px 16px;
  border-top: 1px solid rgba(255,107,53,0.12);
  display: flex;
  flex-direction: column;
  gap: 4px;
  flex-shrink: 0;
}
.panel-nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: 4px;
  font-family: 'Exo 2', sans-serif;
  font-weight: 600;
  font-size: 0.9rem;
  letter-spacing: 0.08em;
  color: var(--muted);
  transition: color 0.3s, background 0.3s;
  cursor: pointer;
}
.panel-nav-item:hover { color: var(--white); background: rgba(255,107,53,0.1); }
.panel-nav-item .ico { font-size: 1.1rem; }

/* ═══════════════════════════════════════════
   HERO SLIDER
═══════════════════════════════════════════ */
#heroSlider {
  position: relative;
  width: 100%;
  height: 100svh;
  overflow: hidden;
  margin-top: 62px;
}
.hero-slide {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.9s ease;
}
.hero-slide.active { opacity: 1; }
.hero-slide img {
  width:100%; height:100%;
  object-fit: cover;
  filter: brightness(0.55) saturate(1.2);
  transform: scale(1.05);
  transition: transform 8s ease;
}
.hero-slide.active img { transform: scale(1); }
.hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(6,6,16,0.95) 0%, rgba(6,6,16,0.3) 50%, transparent 80%);
}
.hero-content {
  position: absolute;
  bottom: 100px;
  left: 40px;
  right: 40px;
  z-index: 5;
}
@media(max-width:600px){ .hero-content { left:20px; right:20px; bottom:80px; } }

.hero-cat {
  font-family: 'Orbitron', monospace;
  font-size: clamp(0.55rem,1.5vw,0.8rem);
  letter-spacing: 0.5em;
  color: var(--a1);
  margin-bottom: 12px;
  transform: translateY(20px);
  opacity: 0;
  animation: heroTextIn 0.7s 0.2s ease forwards;
}
.hero-title {
  font-family: 'Black Han Sans', sans-serif;
  font-size: clamp(2.5rem, 8vw, 7rem);
  line-height: 0.95;
  letter-spacing: 0.04em;
  color: var(--white);
  margin-bottom: 20px;
  transform: translateY(30px);
  opacity: 0;
  animation: heroTextIn 0.7s 0.35s ease forwards;
  /* 3D text */
  text-shadow:
    3px 3px 0 rgba(255,107,53,0.5),
    6px 6px 0 rgba(255,107,53,0.25),
    9px 9px 0 rgba(255,107,53,0.1),
    0 0 60px rgba(255,107,53,0.3);
}
.hero-desc {
  font-family: 'Exo 2', sans-serif;
  font-size: clamp(0.85rem, 2vw, 1.1rem);
  color: rgba(244,244,255,0.65);
  max-width: 460px;
  transform: translateY(20px);
  opacity: 0;
  animation: heroTextIn 0.7s 0.5s ease forwards;
  margin-bottom: 24px;
}
@keyframes heroTextIn {
  to { opacity:1; transform:translateY(0); }
}
.hero-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-family: 'Orbitron', monospace;
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 0.25em;
  padding: 13px 30px;
  border-radius: 3px;
  position: relative;
  overflow: hidden;
  color: var(--white);
  opacity: 0;
  animation: heroTextIn 0.7s 0.65s ease forwards;
  transition: box-shadow 0.3s;
}
.hero-btn .hb-bg {
  position: absolute; inset: 0;
  background: var(--g1);
  z-index: 0;
}
.hero-btn .hb-shine {
  position: absolute; top: 0; left: -100%;
  width: 60%; height: 100%;
  background: linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);
  animation: shine 2.5s 1.5s ease-in-out infinite;
  z-index: 1;
}
.hero-btn span { position:relative; z-index:2; }
.hero-btn:hover { box-shadow: 0 0 30px rgba(255,107,53,0.6); }
@keyframes shine { to { left: 200%; } }

/* HERO DOTS */
.hero-dots {
  position: absolute;
  bottom: 30px; left: 50%;
  transform: translateX(-50%);
  display: flex; gap: 10px;
  z-index: 10;
}
.hero-dot {
  width: 28px; height: 3px;
  background: rgba(255,255,255,0.25);
  border-radius: 2px;
  transition: background 0.3s, width 0.3s;
  cursor: pointer;
}
.hero-dot.active { background: var(--a1); width: 44px; }

/* HERO ARROWS */
.hero-arrow {
  position: absolute;
  top: 50%; transform: translateY(-50%);
  z-index: 10;
  width: 48px; height: 48px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(6,6,16,0.5);
  backdrop-filter: blur(6px);
  color: var(--white);
  font-size: 1.2rem;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
}
.hero-arrow:hover { border-color: var(--a1); background: rgba(255,107,53,0.15); box-shadow: 0 0 20px rgba(255,107,53,0.4); }
.hero-arrow.prev { left: 20px; }
.hero-arrow.next { right: 20px; }

/* ═══════════════════════════════════════════
   MAIN CONTENT
═══════════════════════════════════════════ */
#mainContent { position: relative; z-index: 10; }

/* SECTION HEADER */
.section-head {
  text-align: center;
  padding: 70px 20px 40px;
}
.section-eyebrow {
  font-family: 'Orbitron', monospace;
  font-size: clamp(0.55rem, 1.5vw, 0.75rem);
  letter-spacing: 0.55em;
  color: var(--a1);
  text-transform: uppercase;
  margin-bottom: 14px;
}
.section-title {
  font-family: 'Black Han Sans', sans-serif;
  font-size: clamp(2.2rem, 7vw, 5.5rem);
  letter-spacing: 0.06em;
  line-height: 0.95;
  /* 3D FONT */
  color: var(--white);
  text-shadow:
    2px 2px 0 rgba(0,212,255,0.5),
    4px 4px 0 rgba(0,212,255,0.3),
    6px 6px 0 rgba(0,212,255,0.1),
    0 0 50px rgba(0,212,255,0.2);
}
.section-title .accent {
  background: var(--g1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;

.g-item {
  break-inside: avoid;
  margin-bottom: 14px;
  border-radius: 6px;
  overflow: hidden;
  position: relative;
  cursor: pointer;
  animation: gridIn 0.55s cubic-bezier(0.23,1,0.32,1) both;
  border: 1px solid rgba(255,255,255,0.05);
}
.g-item:nth-child(1){animation-delay:.04s}
.g-item:nth-child(2){animation-delay:.08s}
.g-item:nth-child(3){animation-delay:.12s}
.g-item:nth-child(4){animation-delay:.16s}
.g-item:nth-child(5){animation-delay:.2s}
.g-item:nth-child(6){animation-delay:.24s}
.g-item:nth-child(7){animation-delay:.28s}
.g-item:nth-child(8){animation-delay:.32s}
.g-item:nth-child(9){animation-delay:.36s}
.g-item:nth-child(10){animation-delay:.4s}
.g-item:nth-child(11){animation-delay:.44s}
.g-item:nth-child(12){animation-delay:.48s}

  width:100%;

  transition: transform 0.55s ease, filter 0.4s;
  filter: brightness(0.88) saturate(1.1);
}

  position:absolute; inset:0;
  background: linear-gradient(to top, rgba(6,6,16,0.95) 0%, transparent 55%);

  transition: opacity 0.4s;
  padding: 16px 14px 14px;
  display:flex; flex-direction:column; justify-content:flex-end;
}

  transition: opacity 0.3s, transform 0.3s;
}

/* ════════════════════════════════════
   SPLASH LOADER
════════════════════════════════════ */
let pct = 0;
const bar = document.getElementById('splashBar');
const pctEl = document.getElementById('splashPct');
const splashTimer = setInterval(() => {
  pct += Math.random() * 18 + 5;
  if (pct >= 100) {
    pct = 100;
    clearInterval(splashTimer);
    bar.style.width = '100%';
    pctEl.textContent = '100%';
    // Hide progress, show Open button
    setTimeout(() => {
      document.getElementById('splashLoadingArea').style.display = 'none';
      const btn = document.getElementById('splashOpenBtn');
      btn.style.display = 'inline-flex';
    }, 400);
    return;
  }
  bar.style.width = pct + '%';
  pctEl.textContent = Math.floor(pct) + '%';
}, 180);

function enterApp() {
  const btn = document.getElementById('splashOpenBtn');
  // Flash button then open
  btn.style.transform = 'scale(0.95)';
  setTimeout(() => {
    document.getElementById('splash').classList.add('hide');
    document.getElementById('appNav').classList.add('show');
    buildHeroSlider();
    buildGallery();
    buildPanelSlides();
  }, 300);
}

/* ════════════════════════════════════
   HERO SLIDER
════════════════════════════════════ */
let heroIdx = 0, heroTimer;
function buildHeroSlider() {
  const slider = document.getElementById('heroSlider');
  const dotsEl = document.getElementById('heroDots');
  HERO_DATA.forEach((h, i) => {
    const slide = document.createElement('div');
    slide.className = 'hero-slide' + (i === 0 ? ' active' : '');
    slide.innerHTML = `
      <img src="${h.src}" alt="${h.title}">
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <p class="hero-cat">${h.cat}</p>
        <h1 class="hero-title">${h.title}</h1>
        <p class="hero-desc">${h.desc}</p>
        <button class="hero-btn" onclick="scrollToGallery()">
          <div class="hb-bg"></div>
          <div class="hb-shine"></div>
          <span>View Gallery</span>
        </button>
      </div>`;
    slider.insertBefore(slide, dotsEl);
    const dot = document.createElement('div');
    dot.className = 'hero-dot' + (i === 0 ? ' active' : '');
    dot.onclick = () => goHero(i);
    dotsEl.appendChild(dot);
  });
  heroTimer = setInterval(nextHero, 5500);
}
function goHero(n) {
  document.querySelectorAll('.hero-slide')[heroIdx].classList.remove('active');
  document.querySelectorAll('.hero-dot')[heroIdx].classList.remove('active');
  heroIdx = (n + HERO_DATA.length) % HERO_DATA.length;
  document.querySelectorAll('.hero-slide')[heroIdx].classList.add('active');
  document.querySelectorAll('.hero-dot')[heroIdx].classList.add('active');
}
function nextHero() { goHero(heroIdx + 1); }
function prevHero() { goHero(heroIdx - 1); }
document.getElementById('heroNext').onclick = () => { clearInterval(heroTimer); nextHero(); heroTimer = setInterval(nextHero,5500); };
document.getElementById('heroPrev').onclick = () => { clearInterval(heroTimer); prevHero(); heroTimer = setInterval(nextHero,5500); };
function scrollToGallery() { document.getElementById('mainContent').scrollIntoView({behavior:'smooth'}); }

/* ════════════════════════════════════
   PANEL SLIDES (hamburger content)
════════════════════════════════════ */
function buildPanelSlides() {
  const container = document.getElementById('panelSlides');
  PHOTOS.slice(0, 18).forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'slide-card';
    card.innerHTML = `
      <img src="${p.src}" alt="${p.title}" loading="lazy">
      <div class="slide-badge">${p.cat.toUpperCase()}</div>
      <div class="slide-info">
        <div class="slide-cat">${p.cat}</div>
        <div class="slide-name">${p.title}</div>
      </div>`;
    card.onclick = () => {
      closePanel();
      openLightbox(i);
    };
    container.appendChild(card);
  });
}

/* ════════════════════════════════════
   HAMBURGER / PANEL
════════════════════════════════════ */
const ham = document.getElementById('hamburger');
const panel = document.getElementById('sidePanel');
const backdrop = document.getElementById('backdrop');
ham.onclick = openPanel;
document.getElementById('panelClose').onclick = closePanel;
backdrop.onclick = closePanel;
function openPanel() {
  ham.classList.add('open');
  panel.classList.add('open');
  backdrop.classList.add('show');
}
function closePanel() {
  ham.classList.remove('open');
  panel.classList.remove('open');
  backdrop.classList.remove('show');
}

/* ════════════════════════════════════
   GALLERY
════════════════════════════════════ */
let currentCat = 'all';
const BATCH = 12;
let shownCount = 0;

function buildGallery() {
  renderGallery();
}

function renderGallery() {
  const grid = document.getElementById('gallery');
  grid.innerHTML = '';
  shownCount = 0;
  const filtered = currentCat === 'all' ? PHOTOS : PHOTOS.filter(p => p.cat === currentCat);
  const initial = filtered.slice(0, BATCH);
  initial.forEach((p, i) => addCard(p, PHOTOS.indexOf(p), i));
  shownCount = initial.length;
  updateStats(shownCount, filtered.length);
  document.getElementById('loadSec').style.display = filtered.length > shownCount ? 'block' : 'none';
}

function addCard(p, globalIdx, animIdx) {
  const grid = document.getElementById('gallery');
  const item = document.createElement('div');
  item.className = 'g-item';
  item.dataset.idx = globalIdx;
  item.innerHTML = `
    <img src="${p.src}" alt="${p.title}" loading="lazy">
    <div class="g-tag">${p.cat.toUpperCase()}</div>
    <div class="g-overlay">
      <div class="g-cat">${p.cat.toUpperCase()}</div>
      <div class="g-title">${p.title}</div>
    </div>`;
  item.onclick = () => openLightbox(globalIdx);
  grid.appendChild(item);
}

function updateStats(shown, total) {
  document.getElementById('sShown').textContent = shown;
  document.getElementById('sTotal').textContent = total;
}

/* FILTER */
document.getElementById('filterBar').addEventListener('click', e => {
  const btn = e.target.closest('.f-btn');
  if (!btn) return;
  document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCat = btn.dataset.cat;
  renderGallery();
});

/* LOAD MORE */
document.getElementById('loadBtn').onclick = function() {
  const btn = this;
  btn.classList.add('loading');
  setTimeout(() => {
    const filtered = currentCat === 'all' ? PHOTOS : PHOTOS.filter(p => p.cat === currentCat);
    const next = filtered.slice(shownCount, shownCount + BATCH);
    next.forEach((p, i) => {
      const globalIdx = PHOTOS.indexOf(p);
      addCard(p, globalIdx, i);
      const items = document.querySelectorAll('.g-item');
      const last = items[items.length - 1 - (next.length - 1 - i)];
      if(last){ setTimeout(()=>last.classList.add('pop-in'), i*60); }
    });
    shownCount += next.length;
    btn.classList.remove('loading');
    updateStats(shownCount, filtered.length);
    if (shownCount >= filtered.length) {
      document.getElementById('loadSec').style.display = 'none';
    }
  }, 1300);
};

/* ════════════════════════════════════
   LIGHTBOX
════════════════════════════════════ */
let lbIdx = 0;
let lbPool = [];

function openLightbox(globalIdx) {
  lbPool = currentCat === 'all' ? PHOTOS.map((_,i)=>i) : PHOTOS.map((p,i)=>p.cat===currentCat?i:-1).filter(i=>i>=0);
  lbIdx = lbPool.indexOf(globalIdx);
  if(lbIdx < 0) lbIdx = 0;
  showLb();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function showLb() {
  const p = PHOTOS[lbPool[lbIdx]];
  document.getElementById('lbImg').src = p.src.replace('w=800','w=1400');
  document.getElementById('lbCatTxt').textContent = p.cat.toUpperCase();
  document.getElementById('lbTtl').textContent = p.title;
}
function closeLb() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('lbClose').onclick = closeLb;
document.getElementById('lightbox').onclick = e => { if(e.target===document.getElementById('lightbox')) closeLb(); };
document.getElementById('lbNext').onclick = () => { lbIdx = (lbIdx+1)%lbPool.length; showLb(); };
document.getElementById('lbPrev').onclick = () => { lbIdx = (lbIdx-1+lbPool.length)%lbPool.length; showLb(); };
document.addEventListener('keydown', e => {
  if(!document.getElementById('lightbox').classList.contains('open')) return;
  if(e.key==='Escape') closeLb();
  if(e.key==='ArrowRight'){ lbIdx=(lbIdx+1)%lbPool.length; showLb(); }
  if(e.key==='ArrowLeft'){ lbIdx=(lbIdx-1+lbPool.length)%lbPool.length; showLb(); }
});
</script>
